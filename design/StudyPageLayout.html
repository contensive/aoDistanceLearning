<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
  <body>
    
    {{#distanceLearning}}
      <div class="container my-5">
          <div class="col-10 m-auto">
              <div class="card rounded-3 shadow-sm">
                  <div class="card-body p-5"> 
                    <div class="d-flex justify-content-between align-items-center mb-3">
                      <h2>{{{quizTitle}}}</h2>
                      {{#allowDownload}}
                        <a href="#" class="btn btn-outline-primary btn-sm rounded-pill px-3"><i class="fa-solid fa-download"></i> Download </a>
                      {{/allowDownload}}
                    </div>
                    <div class="card-text mb-3">
                      {{{quizDescription}}}
                    </div>
                    <div class="mb-3">
                      {{#quizMedia}}
                        {{{mediaUrl}}}
                      {{/quizMedia}}
                    </div>
                  
                  </div>
                  <div class="card-footer px-5 py-3">
                      {{#quizNextStep}}<a href="{{{startQuizBtn}}}" class="btn btn-primary px-4">Start Quiz</a>{{/quizNextStep}}
                  </div>
              </div>
          </div>
      </div>
    {{/distanceLearning}}
    
    <script data-delete src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script data-delete src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>  </body>
</html>
